<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f3;--surface:#fff;--s2:#f0f0eb;
  --border:#e0e0d8;--border2:#ccccc4;
  --text:#1c1c1a;--muted:#686860;--muted2:#a0a098;
  --accent:#1a6b4a;--al:#e6f4ee;--am:#2d9068;
  --red:#b83232;--rl:#fdf0f0;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;}

.login-wrap{width:100%;max-width:420px;padding:20px;}

.logo-block{text-align:center;margin-bottom:36px;}
.logo-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;box-shadow:0 4px 16px rgba(26,107,74,.25);}
.logo-name{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;}
.logo-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.05em;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 2px 20px rgba(0,0,0,.06);}

.card-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}

/* Google button */
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px 20px;background:#fff;border:1.5px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.google-btn:hover{border-color:var(--accent);background:var(--al);box-shadow:0 2px 8px rgba(26,107,74,.12);}
.google-btn:active{transform:scale(.99);}
.google-btn:disabled{opacity:.5;cursor:not-allowed;}

.google-logo{width:20px;height:20px;flex-shrink:0;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-txt{font-size:12px;color:var(--muted2);}

/* Email/password (optional fallback) */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.input{height:40px;padding:0 12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:13.5px;color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.input:focus{border-color:var(--accent);background:#fff;}

.btn-p{display:flex;align-items:center;justify-content:center;width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-p:hover{background:var(--am);}
.btn-p:disabled{opacity:.5;cursor:not-allowed;}

.error-box{background:var(--rl);border:1px solid #e8b8b8;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.error-box.show{display:block;}

.loading-spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{text-align:center;font-size:12px;color:var(--muted2);margin-top:20px;line-height:1.6;}
.footer-note a{color:var(--accent);text-decoration:none;}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;display:none;}
.loading-overlay.show{display:flex;}
.lo-spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.lo-txt{font-size:13.5px;color:var(--muted);font-family:var(--mono);}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-icon">💠</div>
    <div class="logo-name">FinTrack</div>
    <div class="logo-sub">Financial Management System</div>
  </div>

  <div class="card">
    <div class="card-title">Sign in to continue</div>
    <div class="card-sub">Access your organization's financial dashboard.</div>

    <div class="error-box" id="error-box"></div>

    <!-- GOOGLE SIGN IN -->
    <button class="google-btn" id="google-btn" onclick="signInWithGoogle()">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><div class="divider-line"></div><div class="divider-txt">or sign in with email</div><div class="divider-line"></div></div>

    <div class="field">
      <label>Email</label>
      <input type="email" class="input" id="email-inp" placeholder="you@organization.com" onkeydown="if(event.key==='Enter')signInEmail()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" class="input" id="pass-inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')signInEmail()">
    </div>
    <button class="btn-p" id="email-btn" onclick="signInEmail()">Sign In</button>
  </div>

  <div class="footer-note">
    By signing in you agree to your organization's data policies.<br>
    Need access? Contact your administrator.
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="lo-spinner"></div>
  <div class="lo-txt">Signing you in…</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getUserOrgs } from './db.js';

const firebaseConfig = {
  apiKey: "AIzaSyBEcPce9nVsnleQ2A76dJUiLm-vyD2jGaU",
  authDomain: "financially-49172.firebaseapp.com",
  projectId: "financially-49172",
  storageBucket: "financially-49172.firebasestorage.app",
  messagingSenderId: "673197823318",
  appId: "1:673197823318:web:d03c5cc42e39d2fad332f7",
  measurementId: "G-J2SVT6L9ZE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// After sign-in: check if user has an org already
async function redirectAfterLogin(user) {
  document.getElementById('loading-overlay').classList.add('show');
  // Check localStorage first (fast)
  const cachedOrg = localStorage.getItem('ft_orgId');
  if (cachedOrg) {
    window.location.href = 'index.html';
    return;
  }
  // Check Firestore for existing orgs
  try {
    const orgs = await getUserOrgs(user.uid);
    if (orgs && orgs.length > 0) {
      // Use first org (in future: show org picker if multiple)
      localStorage.setItem('ft_orgId', orgs[0].orgId);
      window.location.href = 'index.html';
    } else {
      // No org — go to onboarding
      window.location.href = 'onboarding.html';
    }
  } catch (e) {
    // Firestore error (first login, rules not set yet, etc.) — go to onboarding
    window.location.href = 'onboarding.html';
  }
}

// Check if already logged in
onAuthStateChanged(auth, user => {
  if (user) redirectAfterLogin(user);
});

// Google sign in
window.signInWithGoogle = async function() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div> Signing in…';
  showError('');
  try {
    await signInWithPopup(auth, provider);
    await redirectAfterLogin(auth.currentUser);
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false;
    btn.innerHTML = `<svg class="google-logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google`;
  }
};

// Email sign in
window.signInEmail = async function() {
  const email = document.getElementById('email-inp').value.trim();
  const pass = document.getElementById('pass-inp').value;
  if (!email || !pass) { showError('Please enter your email and password.'); return; }
  const btn = document.getElementById('email-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  showError('');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    await redirectAfterLogin(auth.currentUser);
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
};

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.classList.toggle('show', !!msg);
}

function friendlyError(code) {
  const map = {
    'auth/popup-closed-by-user': 'Sign-in was cancelled. Please try again.',
    'auth/popup-blocked': 'Popup was blocked. Please allow popups for this site.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed': 'Network error. Please check your connection.',
  };
  return map[code] || 'Sign-in failed. Please try again.';
}
</script>
</body>
</html>
