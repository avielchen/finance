<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Vendors</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--surface:#fff;--surface2:#f0f0eb;--border:#e2e2da;--border2:#d0d0c8;--text:#1a1a18;--muted:#6b6b65;--muted2:#9b9b95;--accent:#1a6b4a;--accent-light:#e8f4ee;--accent-mid:#2d9068;--red:#c0392b;--red-light:#fdf0ef;--yellow:#b07d00;--yellow-light:#fdf8e8;--blue:#1a4a8a;--blue-light:#eef3fb;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--sc:56px;--se:210px;--tb:52px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:var(--sc);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:width .22s ease;overflow:hidden;}
.sidebar.open{width:var(--se);}
.sidebar-top{height:var(--tb);display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.hbg{width:28px;height:28px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:5px;flex-shrink:0;padding:0;}
.hbg span{display:block;height:1.5px;background:var(--muted);border-radius:2px;}
.hbg:hover span{background:var(--text);}
.s-logo{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;opacity:0;transition:opacity .15s;}
.sidebar.open .s-logo{opacity:1;}
.nav-sec{padding:16px 0 8px;border-bottom:1px solid var(--border);}
.nav-sec:last-of-type{border-bottom:none;}
.ni{display:flex;align-items:center;gap:12px;padding:9px 14px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s;border-left:2px solid transparent;text-decoration:none;}
.ni:hover{background:var(--surface2);color:var(--text);}
.ni.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light);}
.nic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.nl{opacity:0;transition:opacity .15s;}
.sidebar.open .nl{opacity:1;}
.main{margin-left:var(--sc);flex:1;display:flex;flex-direction:column;transition:margin-left .22s ease;}
.sidebar.open~.main{margin-left:var(--se);}
.topbar{height:var(--tb);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;}
.pt{font-size:15px;font-weight:600;}
.bc{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.content{padding:24px 28px;flex:1;display:flex;align-items:center;justify-content:center;}
.coming-soon{text-align:center;padding:60px;}
.cs-icon{font-size:48px;margin-bottom:16px;}
.cs-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.cs-desc{font-size:14px;color:var(--muted);line-height:1.6;max-width:400px;margin:0 auto 24px;}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <button class="hbg" onclick="document.getElementById('sidebar').classList.toggle('open')"><span></span><span></span><span></span></button>
    <div class="s-logo">FinTrack</div>
  </div>
  <div class="nav-sec"><a class="ni" href="index.html"><span class="nic">⊞</span><span class="nl">Dashboard</span></a></div>
  <div class="nav-sec">
    <a class="ni" href="invoice.html"><span class="nic">📄</span><span class="nl">Tuition</span></a>
    <a class="ni" href="donations.html"><span class="nic">🤝</span><span class="nl">Donations</span></a>
    <a class="ni" href="payments.html"><span class="nic">💳</span><span class="nl">Payments</span></a>
    <a class="ni active" href="vendors.html"><span class="nic">🏢</span><span class="nl">Vendors</span></a>
  </div>
  <div class="nav-sec">
    <a class="ni" href="students.html"><span class="nic">🎓</span><span class="nl">Students</span></a>
    <a class="ni" href="parents.html"><span class="nic">👨‍👩‍👧</span><span class="nl">Parents</span></a>
  </div>
  <div class="nav-sec">
    <a class="ni" href="reports.html"><span class="nic">↗</span><span class="nl">Reports</span></a>
    <a class="ni" href="settings.html"><span class="nic">⚙</span><span class="nl">Settings</span></a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div><div class="pt">Vendors</div><div class="bc">Vendors / Overview</div></div>
    <button class="btn btn-p">+ Add Vendor</button>
  </div>
  <div class="content">
    <div class="coming-soon">
      <div class="cs-icon">🏢</div>
      <div class="cs-title">Vendors — Coming Next</div>
      <div class="cs-desc">Vendor management, invoice approvals, payables tracking, and expense categories. This page is next in the build queue.</div>
      <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--accent);color:#fff;border-radius:7px;text-decoration:none;font-weight:600;font-size:13px;">← Back to Dashboard</a>
    </div>
  </div>
</main>
</div>
</body>
</html>
